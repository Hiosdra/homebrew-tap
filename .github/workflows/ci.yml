name: tap

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Register local tap
        run: |
          tap_path="$(brew --repository)/Library/Taps/hiosdra/homebrew-tap"
          mkdir -p "$(dirname "$tap_path")"
          ln -s "$GITHUB_WORKSPACE" "$tap_path"

      - name: Audit formula
        run: brew audit --formula --strict hiosdra/tap/codex-usage-guard
