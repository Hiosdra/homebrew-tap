name: tap

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  audit:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Audit casks
        run: brew audit --cask --strict Casks/codex-usage-guard.rb
